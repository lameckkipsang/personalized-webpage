<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome To Your Personalized Webpage</h1>
    <p>Please enter your details to personalize your experience.</p>
    <div id="hero-section">
        <form id="user-details">
            <label for="name">Name:</label>
            <input type="text" id="name" required placeholder="Enter Your Name Here">
            <label for="age">Age:</label>
            <input type="number" id="age" required min="1" placeholder="Enter Your Age Here">
            <button onclick="saveData()">Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>

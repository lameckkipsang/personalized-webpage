<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="main-title">Welcome To Your Personalized Webpage</h1>
    <p id="main-desc">Please enter your details to personalize your experience.</p>
    <div id="hero-section">
        <form id="user-details">
            <label for="name">Name:</label>
            <input type="text" id="name" required placeholder="Enter Your Name Here">
            <label for="age">Age:</label>
            <input type="number" id="age" required min="1" placeholder="Enter Your Age Here">
            <button onclick="saveData()">Submit</button>
        </form>
    </div>
    <div id="output-section" style="display: none;">
        <h2 id="greeting"></h2>
        <p id="months-text"></p>
        <p id="adult-text"></p>
        
        <h3>Daily Motivation:</h3>
        <div id="quotes-area"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
